<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="czas_api"></p>

    <script>
        async function pobierzCzas() {
            try {
                const response = await fetch("https://timeapi.io/api/Time/current/zone?timeZone=Europe/Warsaw");
                const data = await response.json();

                const godzina = data.hour.toString().padStart(2, "0");
                const minuta = data.minute.toString().padStart(2, "0");
                const sekunda = data.seconds.toString().padStart(2, "0");

                document.getElementById("czas_api").textContent =
                    "Aktualny czas: " + godzina + ":" + minuta + ":" + sekunda;

            } catch (error) {
                document.getElementById("czas_api").textContent = "Błąd pobierania czasu";
                console.error(error);
            }
        }

        pobierzCzas();

        setInterval(pobierzCzas, 1000);
    </script>
</body>
</html>
