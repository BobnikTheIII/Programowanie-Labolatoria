<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function pi(n) {
            let suma = 0;

            for (let i = 0; i < n; i++) {
                let mianownik = 2 * i + 1;
                let znak = i % 2 === 0 ? 1 : -1;
                suma += znak * (1 / mianownik);
            }

            let y = 4 * suma;
            console.log(y);
        }

        pi(10);
    </script>
</body>
</html>
