<body>
    <script>
        function fibonaczi(n) {
            let a = 0
            let b = 0
            let temp = 0
            for (let i = 0; i < n; i++) {
                temp = b
                b = b + a
                a = temp
                if (b == 0) {
                    b = 1
                }
            }
            console.log(b)
        }
        fibonaczi(6)
    </script>
